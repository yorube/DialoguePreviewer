<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>MBU Yarn Preview</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<!-- 第一行：設定列（語言選擇 + UI 語言 + brand / status） -->
<header class="topbar topbar-settings">
  <span class="brand">MBU Yarn Preview</span>
  <span class="app-version" id="app-version" aria-label="version"></span>
  <label class="ctrl"><span data-i18n="topbar.locale">Text language</span>
    <select id="locale-select"></select>
  </label>
  <label class="ctrl ui-lang-ctrl"><span data-i18n="topbar.uiLang">Interface language</span>
    <select id="ui-lang-select">
      <option value="en">English</option>
      <option value="zh">繁體中文</option>
    </select>
  </label>
  <span id="status" class="status"></span>
  <button id="help-btn" class="help-btn" type="button" data-i18n-title="help.btn.tip" title="Help">?</button>
</header>

<div id="help-overlay" class="help-overlay" hidden role="dialog" aria-modal="true" aria-labelledby="help-title">
  <div class="help-dialog">
    <button class="help-close" id="help-close" type="button" aria-label="Close">×</button>
    <h2 id="help-title" data-i18n="help.title">Help</h2>
    <div class="help-body" data-i18n-html="help.body"></div>
  </div>
</div>

<!-- 第二行：全域功能列（翻譯流程的上傳 / 下載 / 重置；由 translation-ui.js 注入內容） -->
<header class="topbar topbar-globalops" id="topbar-globalops"></header>

<main class="layout">
  <aside class="sidebar">
    <!-- Script 選擇放到 sidebar 最上方 -->
    <div class="sidebar-title">
      <span data-i18n="topbar.script">Script</span>
    </div>
    <select id="script-select" class="sidebar-select"></select>

    <div class="sidebar-title sidebar-title-spaced">
      <span data-i18n="sidebar.nodes">Nodes</span> <span id="node-count" class="count"></span>
    </div>
    <input id="node-filter" type="search" data-i18n-placeholder="input.filter" placeholder="Filter…" class="node-filter">
    <ul id="node-list"></ul>
  </aside>

  <div class="splitter" data-split="sidebar-source"></div>

  <aside class="source-panel">
    <div class="source-header">
      <div class="source-tabs">
        <button class="source-tab active" data-tab="source" data-i18n="panel.source">Source</button>
        <button class="source-tab" data-tab="notes" id="notes-tab-btn">
          <span data-i18n="panel.notes">Notes</span>
        </button>
      </div>
      <span class="src-zoom">
        <button id="src-zoom-out" class="src-zoom-btn" title="A-">A-</button>
        <button id="src-zoom-in" class="src-zoom-btn" title="A+">A+</button>
      </span>
    </div>
    <div id="source-pane-source" class="source-pane active">
      <div id="source-view" class="source-view"></div>
    </div>
    <div id="source-pane-notes" class="source-pane">
      <textarea id="note-textarea" class="note-textarea-full"
        data-i18n-placeholder="note.placeholder"
        placeholder="Add a translator note for this node…"></textarea>
    </div>
  </aside>

  <div class="splitter" data-split="source-dialogue"></div>

  <section class="dialogue">
    <header class="dialogue-header">
      <h1 id="current-node">—</h1>
    </header>
    <!-- Edit Mode 切換放在 node 標題下方一行 -->
    <div class="dialogue-modebar" id="dialogue-modebar"></div>
    <div class="dialogue-toolbar">
      <button id="back-line-btn" class="action-btn" title="←" data-i18n="btn.stepBack">← Step back</button>
      <button id="replay-btn" class="action-btn" title="R" data-i18n="btn.replayNode">⟳ Replay this node</button>
      <button id="note-toggle" class="action-btn note-toggle-btn" type="button"
        data-i18n="btn.openNote" title="Open notes tab">📝 Note</button>
      <button id="compare-btn" class="action-btn" type="button"
        data-i18n="btn.compareLangs" data-i18n-title="btn.compareLangs.tip"
        title="Compare translations across all languages">📊 Compare languages</button>
    </div>
    <div id="compare-overlay" class="help-overlay compare-overlay" hidden role="dialog" aria-modal="true" aria-labelledby="compare-title">
      <div class="help-dialog compare-dialog">
        <button class="help-close" id="compare-close" type="button" aria-label="Close">×</button>
        <h2 id="compare-title" data-i18n="compare.title">Translation comparison</h2>
        <div class="compare-toolbar">
          <span class="compare-node-label" id="compare-node-title"></span>
          <span class="compare-tip" data-i18n="compare.tip">Side-by-side translations of the current node across all available languages.</span>
        </div>
        <div id="compare-body" class="compare-body"></div>
      </div>
    </div>
    <div id="transcript" class="transcript"></div>
  </section>

  <div class="splitter" data-split="dialogue-vars"></div>

  <aside class="vars-panel">
    <div class="sidebar-title" data-i18n="panel.vars">Variables</div>
    <div id="vars"></div>
  </aside>
</main>

<script src="parser.js"></script>
<script src="runtime.js"></script>
<!-- Translation pipeline (porting v2 YarnFileConverter into the browser) -->
<script src="xlsx.full.min.js"></script>
<script src="jszip.min.js"></script>
<script src="yarn-converter.js"></script>
<script src="loc-parser.js"></script>
<script src="loc-writer.js"></script>
<script src="translation-state.js"></script>
<script src="translation-ui.js"></script>
<script src="ui.js"></script>
</body>
</html>
