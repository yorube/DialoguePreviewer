<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>MBU Yarn Preview</title>
<link rel="stylesheet" href="style.css?v=ux-redesign">
</head>
<body>
<nav class="page-tabs" role="tablist">
  <button class="page-tab active" data-page="dialogue" type="button" role="tab" aria-selected="true" data-i18n="page.dialogue">💬 Dialogue</button>
  <button class="page-tab" data-page="ui-strings" type="button" role="tab" aria-selected="false" data-i18n="page.uiStrings">🧩 UI Strings</button>
</nav>

<div id="page-dialogue" class="page page-dialogue">
<!-- 第一行：設定列（語言選擇 + UI 語言 + brand / status） -->
<header class="topbar topbar-settings">
  <span class="brand">MBU Yarn Preview</span>
  <span class="app-version" id="app-version" aria-label="version"></span>
  <label class="ctrl"><span data-i18n="topbar.locale">Text language</span>
    <select id="locale-select"></select>
  </label>
  <label class="ctrl ui-lang-ctrl"><span data-i18n="topbar.uiLang">Interface language</span>
    <select id="ui-lang-select">
      <option value="en">English</option>
      <option value="zh">繁體中文</option>
    </select>
  </label>
  <span id="status" class="status"></span>
  <button id="help-btn" class="action-btn" type="button" data-i18n="help.btn" data-i18n-title="help.btn.tip" title="Help">Help</button>
</header>

<div id="help-overlay" class="help-overlay" hidden role="dialog" aria-modal="true" aria-labelledby="help-title">
  <div class="help-dialog">
    <button class="help-close" id="help-close" type="button" aria-label="Close">×</button>
    <h2 id="help-title" data-i18n="help.title">Help</h2>
    <div class="help-body" data-i18n-html="help.body"></div>
  </div>
</div>

<!-- 第二行：全域功能列（翻譯流程的上傳 / 下載 / 重置；由 translation-ui.js 注入內容） -->
<header class="topbar topbar-globalops" id="topbar-globalops"></header>

<!-- Translation progress bar — fed by translation-ui.js updateStats.
     Disclosure (▼) expands the per-status breakdown directly underneath. -->
<div class="t-progress" id="t-progress" hidden>
  <span class="t-progress-label">
    <span id="t-prog-done">0</span> / <span id="t-prog-total">0</span>
    <span data-i18n="tr.progress.translated">translated</span>
  </span>
  <div class="t-progress-track"><div class="t-progress-fill" id="t-prog-fill" style="width:0%"></div></div>
  <span class="t-progress-label" id="t-prog-pct">0%</span>
  <button id="t-prog-toggle" class="t-progress-toggle" type="button" hidden aria-expanded="false">▼</button>
</div>
<div class="t-progress-breakdown" id="t-progress-breakdown" hidden></div>

<main class="layout">
  <aside class="sidebar">
    <!-- UID Searcher：貼一段 UID（{guid}-{nodeIndex}-{srcLine}）後跳到對應 script + node -->
    <div class="sidebar-title">
      <span data-i18n="sidebar.uidSearch">UID Search</span>
    </div>
    <form id="uid-search-form" class="uid-search">
      <input id="uid-search-input" type="text" autocomplete="off" spellcheck="false"
        data-i18n-placeholder="sidebar.uidSearch.placeholder"
        placeholder="Paste UID…">
      <button id="uid-search-btn" type="submit" class="uid-search-btn"
        data-i18n-title="sidebar.uidSearch.tip" title="Search">🔍</button>
    </form>
    <div id="uid-search-result" class="uid-search-result" hidden></div>

    <div class="sidebar-title sidebar-title-spaced">
      <span data-i18n="topbar.script">Script</span>
    </div>
    <select id="script-select" class="sidebar-select"></select>

    <div class="sidebar-title sidebar-title-spaced">
      <span data-i18n="sidebar.nodes">Nodes</span> <span id="node-count" class="count"></span>
    </div>
    <!-- Status filter chip row populated by ui.js renderStatusFilterBar() -->
    <div id="status-filter-bar" class="sidebar-status-filter"></div>
    <input id="node-filter" type="search" data-i18n-placeholder="input.filter" placeholder="Filter…" class="node-filter">
    <ul id="node-list"></ul>
  </aside>

  <div class="splitter" data-split="sidebar-source"></div>

  <aside class="source-panel">
    <div class="source-header">
      <div class="source-tabs">
        <button class="source-tab active" data-tab="source" data-i18n="panel.source">Source</button>
        <button class="source-tab" data-tab="notes" id="notes-tab-btn">
          <span data-i18n="panel.notes">Notes</span>
        </button>
      </div>
      <span class="src-zoom">
        <button id="src-zoom-out" class="src-zoom-btn" title="A-">A-</button>
        <button id="src-zoom-in" class="src-zoom-btn" title="A+">A+</button>
      </span>
    </div>
    <div id="source-pane-source" class="source-pane active">
      <div id="source-view" class="source-view"></div>
    </div>
    <div id="source-pane-notes" class="source-pane">
      <textarea id="note-textarea" class="note-textarea-full"
        data-i18n-placeholder="note.placeholder"
        placeholder="Add a translator note for this node…"></textarea>
    </div>
  </aside>

  <div class="splitter" data-split="source-dialogue"></div>

  <section class="dialogue">
    <header class="dialogue-header">
      <h1 id="current-node">—</h1>
    </header>
    <!-- Edit Mode 切換放在 node 標題下方一行 -->
    <div class="dialogue-modebar" id="dialogue-modebar"></div>
    <div class="dialogue-toolbar">
      <button id="play-btn" class="action-btn primary" type="button"
        data-i18n="btn.play" data-i18n-title="btn.play.tip" title="Space / Enter">▶ Play</button>
      <button id="back-line-btn" class="action-btn" title="← / Backspace" data-i18n="btn.stepBack">← Step back</button>
      <button id="replay-btn" class="action-btn" title="R" data-i18n="btn.replayNode">⟳ Replay</button>
      <button id="note-toggle" class="action-btn note-toggle-btn" type="button"
        data-i18n="btn.openNote" title="Open notes tab">📝 Note</button>
    </div>
    <div id="transcript" class="transcript"></div>
    <div id="compare-view" class="compare-view"></div>
  </section>

  <div class="splitter" data-split="dialogue-vars"></div>

  <aside class="vars-panel">
    <div class="sidebar-title" data-i18n="panel.vars">Variables</div>
    <div id="vars"></div>
  </aside>
</main>
</div>

<div id="page-ui-strings" class="page page-ui-strings"></div>

<!-- Cache-bust query string is bumped per deploy that changes JS — same
     mechanism style.css already uses. Browsers aggressively cache .js
     responses (especially GitHub Pages' CDN), and without this users on
     a tab they kept open across deploys would silently run old code. -->
<script src="parser.js?v=review-status-2"></script>
<script src="runtime.js?v=review-status-2"></script>
<!-- Translation pipeline (porting v2 YarnFileConverter into the browser) -->
<script src="xlsx.full.min.js"></script>
<script src="jszip.min.js"></script>
<script src="yarn-converter.js?v=review-status-2"></script>
<script src="loc-parser.js?v=review-status-2"></script>
<script src="loc-writer.js?v=review-status-2"></script>
<script src="translation-state.js?v=review-status-2"></script>
<script src="translation-ui.js?v=review-status-2"></script>
<script src="ui-strings.js?v=review-status-2"></script>
<script src="ui.js?v=review-status-2"></script>
</body>
</html>
